framework:
    rate_limiter:
        login:
            policy: "sliding_window"
            limit: 5
            interval: "1 minute"

        register:
            policy: 'fixed_window'
            limit: 3
            interval: '1 hour'

        resend_verification:
            policy: 'fixed_window'
            limit: 3
            interval: '15 minutes'

        api_global:
            policy: 'token_bucket'
            limit: 100
            rate: { interval: '1 minute', amount: 60 }
