security:
    password_hashers:
        App\Identity\Entity\User: 'auto'

    providers:
        users:
            entity:
                class: App\Identity\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/login
            stateless: true
            provider: users
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: users
            jwt: ~

    access_control:
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/login,    roles: PUBLIC_ACCESS }
        - { path: ^/api,          roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Identity\Entity\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
