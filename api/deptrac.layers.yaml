deptrac:
    paths:
        - ./src
    layers:
        - name: Controller
          collectors:
              - type: directory
                value: src/.*/Controller/.*
        - name: Service
          collectors:
              - type: directory
                value: src/.*/Service/.*
        - name: Repository
          collectors:
              - type: directory
                value: src/.*/Repository/.*
        - name: DTO
          collectors:
              - type: directory
                value: src/.*/DTO/.*
        - name: Entity
          collectors:
              - type: directory
                value: src/.*/Entity/.*
        -   name: Exception
            collectors:
              - type: directory
                value: src/.*/Exception/.*
        -   name: Validator
            collectors:
              - type: directory
                value: src/.*/Validator/.*

    ruleset:
        Controller:
            - Service
            - DTO
        Service:
            - Repository
            - DTO
            - Entity
            - Exception
        Repository:
            - Entity
        DTO:
            - Entity
            - Validator
        Validator:
            - Repository
        Entity: ~
        Exception: ~
    skip_violations:
        App\Identity\Controller\MeController:
            - App\Identity\Entity\User
